baseURL: https://blog.tikum.cc/
locale: id-ID
title: "tikum.cc / blog"

# Disable default taxonomies; we use custom 'categories' via front matter
disableKinds:
  - taxonomy
  - term

# Menus
menu:
  main:
    - identifier: reviews
      name: Ulasan
      url: /reviews/
      weight: 1
    - identifier: tips
      name: Tips
      url: /tips/
      weight: 2
    - identifier: news
      name: Berita
      url: /news/
      weight: 3

# Hugo config
publishDir: public
buildDrafts: false
enableRobotsTXT: true

# Markdown rendering
markup:
  goldmark:
    renderer:
      unsafe: true  # allow inline HTML in markdown

# Create category pages automatically
outputs:
  home:
    - HTML
  page:
    - HTML

# Category-based sections for routing
permalinks:
  posts: /:slug/
